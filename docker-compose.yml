services:
  musicgen-api:
    image: ghcr.io/sam-dumont/musicgen-api:latest
    # To build locally instead:
    # build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - model-cache:/home/appuser/.cache
      - output-data:/data/output
    deploy:
      resources:
        reservations:
          devices:
            # Request all available GPUs - the app handles device assignment:
            # - MusicGen runs on the GPU set by CUDA_VISIBLE_DEVICES (default: first GPU)
            # - ACE-Step runs on the GPU set by ACESTEP_CUDA_DEVICE_ID (default: 0)
            # For dual-GPU setups (e.g. T1000 + GTX 1070), set ACESTEP_CUDA_DEVICE_ID=1
            # in .env to assign ACE-Step to the second GPU.
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

volumes:
  model-cache:
  output-data:
