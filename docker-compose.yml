services:
  musicgen-api:
    image: ghcr.io/sam-dumont/musicgen-api:latest
    # To build locally instead:
    # build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - model-cache:/home/appuser/.cache
      - output-data:/data/output
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

volumes:
  model-cache:
  output-data:
