name: Release Please CI

# Runs CI for release-please PRs. The default GITHUB_TOKEN cannot trigger
# pull_request workflows, so bot PRs get stuck with "Expected" checks.
# pull_request_target fires for all PRs regardless of actor.

on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main]

permissions:
  contents: read

jobs:
  # Only run for release-please bot PRs
  check-actor:
    runs-on: ubuntu-latest
    outputs:
      is-bot: ${{ steps.check.outputs.is-bot }}
    steps:
      - id: check
        run: echo "is-bot=${{ github.event.pull_request.user.login == 'github-actions[bot]' }}" >> "$GITHUB_OUTPUT"

  lint:
    needs: check-actor
    if: needs.check-actor.outputs.is-bot == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install dependencies
        run: make dev

      - name: Lint with ruff
        run: make lint

      - name: Type check with mypy
        run: make typecheck

  test:
    needs: check-actor
    if: needs.check-actor.outputs.is-bot == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Install dependencies
        run: make dev

      - name: Run tests
        run: make test
        env:
          OUTPUT_DIR: /tmp/output

  docker-build:
    needs: check-actor
    if: needs.check-actor.outputs.is-bot == 'true'
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Docker image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          push: false
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          platforms: linux/amd64
